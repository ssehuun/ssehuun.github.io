about_content: |
  Python 기반 백엔드와 지식 플랫폼 구조를 설계·구현하고 있습니다. FastAPI 기반 API, 비동기 처리, SSE 스트리밍, Redis·PostgreSQL 중심 데이터 흐름, Agent/Tool 오케스트레이션 구조를 다루며 운영 중인 서비스를 확장 가능하고 유지보수 가능한 형태로 고도화하는 데 집중하고 있습니다.

  Docker, Kubernetes, Helm 기반 배포 구조와 서로 다른 실행 환경의 차이를 분석하며, 세션·권한 처리, 저장소 추상화, 실시간 이벤트 전달, 시스템 책임 분리 관점에서 구조를 정리해 왔습니다.

  기술을 단순히 구현하는 것에 그치지 않고, 복잡한 AI 서비스를 이해하기 쉬운 구조로 만들고 실제 운영 가능한 플랫폼으로 연결하는 일을 중요하게 생각합니다.

content:
  - title: 경력
    layout: list
    content:
      - layout: left
        title: LG전자
        sub_title: AX플랫폼팀 / MLOps솔루션개발팀 · ML Engineer
        caption: 2023.12 ~ 현재
        description: |
          **전사 AI플랫폼 LGenie Agentic v4 개발 (2026.01 ~ present)**

          LLM 호출 집합 구조였던 기존 플랫폼을 상태 기반 Agentic 실행 런타임으로 고도화.

          *주요 역할*
          - 기존 질의응답형 API를 Agent API 중심 구조로 리팩토링
          - 의도 분석 → Task Planning → Execution → Response Aggregation 흐름으로 실행 구조 재설계
          - Chat Session / Orchestrator State / Task Execution State 기반 멀티스텝 요청 처리 구조 설계
          - Agent, Unit, Tool, Business Agent, Orchestrator, Registry 역할 경계를 코드 기준으로 재정의 및 개발
          - FastAPI 내부 MCP 서버를 Scale-out 가능한 독립 구조로 분리
          - Business Agent 책임 구분 설계: 임직원 검색, 담당자 조회, 업무지식 검색, 개인지식 검색, 메일 보조, Navigator
          - 대용량 파일 기반 업무지식 동기식 업로드를 비동기 방식으로 전환, 전체 서비스 펜딩 현상 제거

          *성과*
          - 역할 경계 명확화로 신규 비즈니스 에이전트 개발 공수 기존 대비 **30% 절감**
          - Tool Decorator → Tool Registry → ToolSet Registry → Tool Service → MCP Exposure 표준 파이프라인 확립
          - 6종 이상의 유스케이스를 동일 플랫폼 내에서 안정적으로 수용
          - 타 현업부서의 MCP 서버 독립 설치·운용 가능한 구조로 확장성 확보

          *Tech Stack:* Python, FastAPI, uvicorn, Redis, PostgreSQL, MySQL, SQLAlchemy ORM

          ---

          **LangGraph 기반 사내 플랫폼 Documentor 개발 (2025.05 ~ 2025.09)**

          로컬/사내 협업 툴(Collab) 문서 기반 지식 추출 및 질의응답 시스템.

          *주요 역할*
          - 멀티 유저 환경에 최적화된 LLM 서비스 아키텍처 및 RESTful API 설계
          - SuperAgent 기반 Task 오케스트레이션 엔진 개발
          - 사용자 요청 → 작업 큐 적재 → LLM/Vector DB 연동 → SSE 응답 전 과정 파이프라인 제어
          - LangChain, LangGraph 외부 라이브러리 의존성 관리 및 추상화 계층(Abstraction Layer) 구현
          - 개별 유저별 세션 관리와 지식 베이스 격리 구조로 멀티테넌시 보안 구현

          *성과*
          - 비즈니스 로직과 인프라 로직 엄격히 분리(Decoupling)하여 병렬 개발 환경 조성
          - 타 본부 및 사내 기술 세미나에서 높은 활용 가치 인정, **신규 비즈니스 수요 확보**
          - 외부 연구 부서 및 협력 기관으로부터 기술 협업 및 도입 요청 획득, 플랫폼 시장성 검증

          *Tech Stack:* Python, FastAPI, uvicorn, Redis, PostgreSQL, Milvus, LangChain, LangGraph

