        caption: 2023.12 ~ 현재
        description: |
          **전사 AI플랫폼 LGenie 개발 (2026.01 ~ present)**
          - 운영 중인 LGenie 플랫폼의 Agentic v4 API 구조 재설계
          - 기존 질의응답형 API를 Agent API 중심 구조로 리팩토링
          - 의도 분석 → task planning → execution → response aggregation 흐름으로 실행 구조 정리
          - Chat Session, orchestrator state, task execution state 기반 멀티스텝 요청 처리 구조 설계
          - Agent, Unit, Tool, Business Agent, Orchestrator, Registry의 역할 경계 재정의 및 개발
          - Tool/MCP 및 Business Agent 구조 표준화 (임직원 검색, 담당자 조회, 업무지식 검색, 개인지식 검색, 메일 보조, Navigator)
          - Agentic v4 런타임 구조 확립으로 API 추가 시 개발 시간 단축
          - 신규 비즈니스 에이전트 개발 공수 기존 대비 30% 절감
          - 대용량 파일 기반 지식 운영 병목 현상 해결, 전체 서비스 펜딩 현상 제거

          **LangGraph 기반 사내 플랫폼 Documentor 개발 (2025.05 ~ 2025.09)**
          - 로컬/사내 협업 툴(Collab) 문서 기반의 지식 추출 및 질의응답 시스템 백엔드 구축
          - SuperAgent 기반의 Task 오케스트레이션 엔진 개발
          - SSE 방식 스트리밍 응답 체계 구축으로 사용자 체감 성능 극대화
          - 타 본부 및 사내 기술 세미나에서 높은 활용 가치 인정, 신규 비즈니스 수요 확보

          **Tech Stack:** Python, FastAPI, uvicorn, Redis, PostgreSQL, MySQL, SQLAlchemy, Milvus, LangChain, LangGraph

